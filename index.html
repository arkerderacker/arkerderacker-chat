<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>School Chat App</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; margin-bottom: 10px; }
    #message { width: 70%; }
    #nickname { width: 200px; }
    button { padding: 5px 10px; }
  </style>
</head>
<body>
  <h2>Simple School Chat</h2>
  <div>
    Nickname: <input id="nickname" placeholder="Enter nickname" />
    <button id="loginBtn">Join Chat</button>
  </div>
  <div id="userInfo"></div>
  <div id="chat"></div>
  <input id="message" placeholder="Type a message..." />
  <button id="sendBtn">Send</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD4i1bs9ocomiyvV3RZSdQ8OcgtJwAqINo",
      authDomain: "arkerderacker-chat.firebaseapp.com",
      databaseURL: "https://arkerderacker-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "arkerderacker-chat",
      storageBucket: "arkerderacker-chat.firebasestorage.app",
      messagingSenderId: "664100165039",
      appId: "1:664100165039:web:804c5ddf7b7af7dab18b5a",
      measurementId: "G-3WWDCRL1TY"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const chatDiv = document.getElementById("chat");
    const messageInput = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const loginBtn = document.getElementById("loginBtn");
    const nicknameInput = document.getElementById("nickname");
    const userInfoDiv = document.getElementById("userInfo");

    let currentUser = null;

    loginBtn.onclick = () => {
      const nick = nicknameInput.value.trim();
      if(!nick) return alert("Enter a nickname!");
      currentUser = nick;
      userInfoDiv.innerHTML = `Logged in as: ${nick}`;
      nicknameInput.disabled = true;
      loginBtn.disabled = true;
      loadChat();
    };

    sendBtn.onclick = () => {
      if(!currentUser) return alert("Enter a nickname first!");
      const text = messageInput.value.trim();
      if(!text) return;

      push(ref(db, 'messages'), {
        text: text,
        sender: currentUser,
        timestamp: Date.now(),
        cid: crypto.randomUUID()
      });

      messageInput.value = "";
    };

    function loadChat() {
      onValue(ref(db, 'messages'), (snapshot) => {
        chatDiv.innerHTML = "";
        snapshot.forEach((child) => {
          const msg = child.val();
          const time = new Date(msg.timestamp).toLocaleTimeString();
          chatDiv.innerHTML += `<p><strong>${msg.sender}</strong> [${time}]: ${msg.text}</p>`;
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
      });
    }
  </script>
</body>
</html>
