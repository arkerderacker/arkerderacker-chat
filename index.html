<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Custom Login Chat App</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    #chat { border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; margin-bottom: 10px; }
    input { padding: 5px; margin: 5px 0; }
    button { padding: 5px 10px; margin-left: 5px; }
  </style>
</head>
<body>
  <h2>Custom Login Chat</h2>

  <div id="loginForm">
    <h3>Register / Login</h3>
    <input id="usernameInput" placeholder="Username" />
    <input id="passwordInput" type="password" placeholder="Password" />
    <button id="registerBtn">Register</button>
    <button id="loginBtn">Login</button>
    <div id="loginMsg" style="color:red;"></div>
  </div>

  <div id="chatUI" style="display:none;">
    <div id="userInfo"></div>
    <div id="chat"></div>
    <input id="message" placeholder="Type a message..." />
    <button id="sendBtn">Send</button>
    <button id="logoutBtn">Logout</button>
    <button id="resetBtn">Reset Chat (Admin)</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, get, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD4i1bs9ocomiyvV3RZSdQ8OcgtJwAqINo",
      authDomain: "arkerderacker-chat.firebaseapp.com",
      databaseURL: "https://arkerderacker-chat-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "arkerderacker-chat",
      storageBucket: "arkerderacker-chat.firebasestorage.app",
      messagingSenderId: "664100165039",
      appId: "1:664100165039:web:804c5ddf7b7af7dab18b5a",
      measurementId: "G-3WWDCRL1TY"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Elements
    const usernameInput = document.getElementById("usernameInput");
    const passwordInput = document.getElementById("passwordInput");
    const registerBtn = document.getElementById("registerBtn");
    const loginBtn = document.getElementById("loginBtn");
    const loginMsg = document.getElementById("loginMsg");

    const loginForm = document.getElementById("loginForm");
    const chatUI = document.getElementById("chatUI");
    const userInfo = document.getElementById("userInfo");
    const chatDiv = document.getElementById("chat");
    const messageInput = document.getElementById("message");
    const sendBtn = document.getElementById("sendBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const resetBtn = document.getElementById("resetBtn");

    let currentUser = null;
    const SECRET_CODE = "qwertyuiop";

    // ----- Check if user is remembered -----
    const savedUser = localStorage.getItem("currentUser");
    if(savedUser){
      currentUser = savedUser;
      loginForm.style.display = "none";
      chatUI.style.display = "block";
      userInfo.textContent = `Logged in as: ${currentUser}`;
      loadChat();
    }

    // ----- Register -----
    registerBtn.onclick = async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if(!username || !password) return loginMsg.textContent = "Enter username and password!";

      const userRef = ref(db, 'users/' + username);
      const snapshot = await get(userRef);
      if(snapshot.exists()){
        loginMsg.textContent = "Username already taken!";
        return;
      }

      await set(userRef, { password: password });
      loginMsg.style.color = "green";
      loginMsg.textContent = "Registered successfully! You can now login.";
    };

    // ----- Login -----
    loginBtn.onclick = async () => {
      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      if(!username || !password) return loginMsg.textContent = "Enter username and password!";

      const userRef = ref(db, 'users/' + username);
      const snapshot = await get(userRef);
      if(!snapshot.exists()){
        loginMsg.textContent = "Username does not exist!";
        return;
      }

      const storedPassword = snapshot.val().password;
      if(password !== storedPassword){
        loginMsg.textContent = "Incorrect password!";
        return;
      }

      // Login successful
      currentUser = username;
      localStorage.setItem("currentUser", currentUser);
      loginForm.style.display = "none";
      chatUI.style.display = "block";
      userInfo.textContent = `Logged in as: ${currentUser}`;
      loadChat();
    };

    // ----- Logout -----
    logoutBtn.onclick = () => {
      currentUser = null;
      localStorage.removeItem("currentUser");
      loginForm.style.display = "block";
      chatUI.style.display = "none";
      usernameInput.value = "";
      passwordInput.value = "";
      loginMsg.textContent = "";
    };

    // ----- Send Message -----
    sendBtn.onclick = () => {
      if(!currentUser) return;
      const text = messageInput.value.trim();
      if(!text) return;

      push(ref(db, 'messages'), {
        text: text,
        sender: currentUser,
        timestamp: Date.now(),
        cid: crypto.randomUUID()
      });

      messageInput.value = "";
    };

    // ----- Load Chat -----
    function loadChat(){
      onValue(ref(db, 'messages'), snapshot => {
        chatDiv.innerHTML = "";
        snapshot.forEach(child => {
          const msg = child.val();
          const time = new Date(msg.timestamp).toLocaleTimeString();
          chatDiv.innerHTML += `<p><strong>${msg.sender}</strong> [${time}]: ${msg.text}</p>`;
        });
        chatDiv.scrollTop = chatDiv.scrollHeight;
      });
    }

    // ----- Reset Chat (Secret Code) -----
    resetBtn.onclick = () => {
      const code = prompt("Enter admin code to reset chat:");
      if(code === SECRET_CODE){
        if(confirm("Are you sure you want to delete all chat messages?")){
          remove(ref(db, 'messages'))
            .then(() => alert("Chat has been reset!"))
            .catch(console.error);
        }
      } else {
        alert("Wrong code! Cannot reset chat.");
      }
    };
  </script>
</body>
</html>
